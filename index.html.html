<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Dashboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:sans-serif;background:#f4f5f7;color:#222;font-size:14px}
  .app{display:flex;height:100vh;overflow:hidden}
  .left{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:12px;gap:10px}
  .right{width:320px;background:#fff;border-left:1px solid #e0e0e0;display:flex;flex-direction:column}
  header{background:#1a1a2e;color:#fff;padding:10px 14px;border-radius:8px;display:flex;justify-content:space-between;align-items:center}
  header h1{font-size:15px;font-weight:600}
  header span{font-size:12px;opacity:.7}
  .search-bar{display:flex;gap:8px}
  .search-bar input{flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff}
  .kategori{display:flex;gap:6px;flex-wrap:wrap}
  .kat-btn{padding:5px 12px;border:1px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:12px;color:#555}
  .kat-btn.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
  .produk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;overflow-y:auto;flex:1}
  .produk-card{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:10px;cursor:pointer;transition:all .15s;user-select:none}
  .produk-card:hover{border-color:#1a1a2e;box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .produk-card:active{transform:scale(.97)}
  .produk-card .nama{font-weight:500;font-size:13px;margin-bottom:4px}
  .produk-card .harga{color:#1a1a2e;font-weight:600;font-size:13px}
  .produk-card .stok{font-size:11px;color:#999;margin-top:2px}
  .produk-card .kat-tag{font-size:10px;background:#f0f0f0;color:#666;padding:2px 6px;border-radius:10px;display:inline-block;margin-bottom:6px}
  .cart-header{padding:12px 14px;border-bottom:1px solid #eee;font-weight:600;font-size:14px;display:flex;justify-content:space-between;align-items:center}
  .cart-header button{font-size:11px;color:#e74c3c;background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:4px}
  .cart-header button:hover{background:#ffeaea}
  .cart-items{flex:1;overflow-y:auto;padding:8px}
  .cart-item{display:flex;align-items:center;gap:8px;padding:7px 6px;border-radius:6px;border-bottom:1px solid #f5f5f5}
  .cart-item:last-child{border-bottom:none}
  .cart-item .ci-nama{flex:1;font-size:12px;font-weight:500}
  .cart-item .ci-harga{font-size:11px;color:#666}
  .ci-qty{display:flex;align-items:center;gap:4px}
  .ci-qty button{width:20px;height:20px;border:1px solid #ddd;background:#f9f9f9;border-radius:4px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;line-height:1}
  .ci-qty span{font-size:13px;font-weight:500;min-width:20px;text-align:center}
  .ci-subtotal{font-size:12px;font-weight:600;min-width:60px;text-align:right}
  .ci-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:15px;padding:0 2px}
  .ci-del:hover{color:#e74c3c}
  .cart-footer{padding:12px 14px;border-top:1px solid #eee;background:#fafafa}
  .total-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px}
  .total-row.grand{font-weight:700;font-size:16px;color:#1a1a2e;margin-bottom:10px}
  .bayar-section{display:flex;flex-direction:column;gap:6px}
  .bayar-section label{font-size:12px;color:#666}
  .bayar-section input{padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:14px;font-weight:600;width:100%}
  .kembalian{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:#27ae60;margin-top:2px}
  .btn-bayar{width:100%;padding:11px;background:#1a1a2e;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
  .btn-bayar:hover{background:#2d2d4e}
  .btn-bayar:disabled{background:#ccc;cursor:not-allowed}
  .empty-cart{text-align:center;padding:40px 20px;color:#bbb;font-size:13px}
  .notif{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999}
  .notif.show{opacity:1}

  /* NOTA THERMAL */
  #nota-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000}
  #nota-overlay.show{display:flex}
  .nota-box{background:#fff;border-radius:10px;padding:16px;width:360px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.2)}
  .nota-box .nota-actions{display:flex;gap:8px;margin-bottom:12px}
  .nota-actions button{flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;background:#f9f9f9;cursor:pointer;font-size:13px}
  .nota-actions .btn-print{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
  .nota-actions .btn-close{color:#e74c3c}
  .ukuran-select{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:12px;color:#555}
  .ukuran-select select{padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#f9f9f9;cursor:pointer}
  #nota-content{font-family:'Courier New',monospace;font-size:12px;line-height:1.6;white-space:pre;background:#fff;border:1px dashed #ccc;padding:12px;border-radius:6px;overflow-x:auto}

  @media print{
    @page{margin:0}
    body *{visibility:hidden}
    #print-frame-wrap,#print-frame-wrap *{visibility:visible}
    #print-frame-wrap{position:fixed;top:0;left:0}
  }
</style>
</head>
<body>

<div class="app">
  <!-- KIRI: Produk -->
  <div class="left">
    <header>
      <h1>🖨 Foto Copy Putra Jaya</h1>
      <span id="tgl-header"></span>
    </header>
    <div class="search-bar">
      <input type="text" id="search" placeholder="Cari produk..." oninput="filterProduk()">
    </div>
    <div class="kategori" id="kategori-list"></div>
    <div class="produk-grid" id="produk-grid"></div>
  </div>

  <!-- KANAN: Keranjang -->
  <div class="right">
    <div class="cart-header">
      <span>Keranjang <span id="jml-item" style="font-size:12px;color:#999;font-weight:400"></span></span>
      <button onclick="clearCart()">Kosongkan</button>
    </div>
    <div class="cart-items" id="cart-items">
      <div class="empty-cart">Belum ada item</div>
    </div>
    <div class="cart-footer">
      <div class="total-row"><span>Subtotal</span><span id="subtotal">Rp 0</span></div>
      <div class="total-row"><span>Diskon</span><span id="diskon" style="color:#e74c3c">- Rp 0</span></div>
      <div class="total-row grand"><span>TOTAL</span><span id="total">Rp 0</span></div>
      <div class="bayar-section">
        <label>Jumlah Bayar</label>
        <input type="number" id="input-bayar" placeholder="0" oninput="hitungKembalian()">
        <div class="kembalian">
          <span>Kembalian</span>
          <span id="kembalian">Rp 0</span>
        </div>
      </div>
      <div class="bayar-section" style="margin-top:4px">
        <label>Tanggal Transaksi</label>
        <input type="datetime-local" id="input-tgl" style="font-size:12px;font-weight:400">
      </div>
      <button class="btn-bayar" id="btn-bayar" onclick="prosesBayar()">Bayar & Cetak Nota</button>
    </div>
  </div>
</div>

<!-- Nota Overlay -->
<div id="nota-overlay">
  <div class="nota-box">
    <div class="nota-actions">
      <button class="btn-close" onclick="tutupNota()">✕ Tutup</button>
      <button onclick="exportPDF()" style="background:#27ae60;color:#fff;border-color:#27ae60">⬇ Simpan PDF</button>
      <button class="btn-print" onclick="cetakNota()">🖨 Cetak Nota</button>
    </div>
    <div class="ukuran-select">
      <span>Ukuran kertas:</span>
      <select id="ukuran-kertas">
        <option value="58">58 mm</option>
        <option value="80" selected>80 mm</option>
      </select>
    </div>
    <div id="nota-content"></div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const produkData = [
  {id:1,nama:"Nasi Goreng",harga:15000,kategori:"Makanan",stok:50},
  {id:2,nama:"Mie Ayam",harga:13000,kategori:"Makanan",stok:40},
  {id:3,nama:"Ayam Bakar",harga:25000,kategori:"Makanan",stok:30},
  {id:4,nama:"Soto Ayam",harga:14000,kategori:"Makanan",stok:35},
  {id:5,nama:"Es Teh",harga:5000,kategori:"Minuman",stok:100},
  {id:6,nama:"Es Jeruk",harga:6000,kategori:"Minuman",stok:100},
  {id:7,nama:"Jus Alpukat",harga:12000,kategori:"Minuman",stok:60},
  {id:8,nama:"Air Mineral",harga:4000,kategori:"Minuman",stok:200},
  {id:9,nama:"Kerupuk",harga:3000,kategori:"Snack",stok:80},
  {id:10,nama:"Pisang Goreng",harga:8000,kategori:"Snack",stok:50},
  {id:11,nama:"Martabak Mini",harga:10000,kategori:"Snack",stok:40},
  {id:12,nama:"Kopi Hitam",harga:7000,kategori:"Minuman",stok:100},
  {id:13,nama:"Print Warna A4 HVS",harga:1000,kategori:"Print",stok:999},
  {id:14,nama:"Print Warna",harga:1000,kategori:"Print",stok:999},
  {id:15,nama:"Print Warna + Kertas A4",harga:1500,kategori:"Print",stok:999},
];

let cart = [];
let katAktif = "Semua";
let noTransaksi = 1001;

function fmt(n){return"Rp "+n.toLocaleString("id-ID")}

function setTgl(){
  const now=new Date();
  document.getElementById("tgl-header").textContent=now.toLocaleDateString("id-ID",{weekday:"short",day:"numeric",month:"short",year:"numeric"})+" "+now.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});
}
setTgl(); setInterval(setTgl,30000);

function buildKategori(){
  const kats=["Semua",...new Set(produkData.map(p=>p.kategori))];
  const el=document.getElementById("kategori-list");
  el.innerHTML=kats.map(k=>`<button class="kat-btn ${k===katAktif?'active':''}" onclick="setKat('${k}')">${k}</button>`).join("");
}

function setKat(k){katAktif=k;buildKategori();renderProduk();}

function filterProduk(){renderProduk();}

function renderProduk(){
  const q=document.getElementById("search").value.toLowerCase();
  const list=produkData.filter(p=>{
    const katOk=katAktif==="Semua"||p.kategori===katAktif;
    const cariOk=p.nama.toLowerCase().includes(q);
    return katOk&&cariOk;
  });
  const grid=document.getElementById("produk-grid");
  if(!list.length){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px;color:#bbb;font-size:13px">Produk tidak ditemukan</div>`;return;}
  grid.innerHTML=list.map(p=>`
    <div class="produk-card" onclick="addToCart(${p.id})">
      <div class="kat-tag">${p.kategori}</div>
      <div class="nama">${p.nama}</div>
      <div class="harga">${fmt(p.harga)}</div>
      <div class="stok">Stok: ${p.stok}</div>
    </div>
  `).join("");
}

function addToCart(id){
  const p=produkData.find(x=>x.id===id);
  const ex=cart.find(x=>x.id===id);
  if(ex){if(ex.qty<p.stok)ex.qty++;else{showNotif("Stok habis!");return;}}
  else cart.push({...p,qty:1});
  renderCart();
  showNotif(p.nama+" ditambahkan");
}

function removeFromCart(id){cart=cart.filter(x=>x.id!==id);renderCart();}

function changeQty(id,d){
  const item=cart.find(x=>x.id===id);
  if(!item)return;
  item.qty+=d;
  if(item.qty<=0)removeFromCart(id);
  else renderCart();
}

function clearCart(){cart=[];document.getElementById("input-bayar").value="";renderCart();}

function renderCart(){
  const el=document.getElementById("cart-items");
  if(!cart.length){el.innerHTML=`<div class="empty-cart">Belum ada item<br><span style="font-size:11px">Klik produk untuk menambahkan</span></div>`;updateTotal();return;}
  el.innerHTML=cart.map(item=>`
    <div class="cart-item">
      <div style="flex:1">
        <div class="ci-nama">${item.nama}</div>
        <div class="ci-harga">${fmt(item.harga)}</div>
      </div>
      <div class="ci-qty">
        <button onclick="changeQty(${item.id},-1)">−</button>
        <span>${item.qty}</span>
        <button onclick="changeQty(${item.id},1)">+</button>
      </div>
      <div class="ci-subtotal">${fmt(item.harga*item.qty)}</div>
      <button class="ci-del" onclick="removeFromCart(${item.id})">×</button>
    </div>
  `).join("");
  updateTotal();
}

function updateTotal(){
  const sub=cart.reduce((s,i)=>s+i.harga*i.qty,0);
  const dis=0;
  const tot=sub-dis;
  document.getElementById("subtotal").textContent=fmt(sub);
  document.getElementById("diskon").textContent="- "+fmt(dis);
  document.getElementById("total").textContent=fmt(tot);
  document.getElementById("jml-item").textContent=cart.length?`(${cart.reduce((s,i)=>s+i.qty,0)} item)`:"";
  document.getElementById("btn-bayar").disabled=cart.length===0;
  hitungKembalian();
}

function hitungKembalian(){
  const tot=cart.reduce((s,i)=>s+i.harga*i.qty,0);
  const bayar=parseInt(document.getElementById("input-bayar").value)||0;
  const kmb=bayar-tot;
  const el=document.getElementById("kembalian");
  el.textContent=fmt(Math.max(0,kmb));
  el.style.color=kmb<0?"#e74c3c":"#27ae60";
}

function prosesBayar(){
  const tot=cart.reduce((s,i)=>s+i.harga*i.qty,0);
  const bayar=parseInt(document.getElementById("input-bayar").value)||0;
  if(bayar<tot&&bayar>0){showNotif("Uang bayar kurang!");return;}
  buatNota(tot,bayar);
  document.getElementById("nota-overlay").classList.add("show");
}

function buatNota(tot,bayar){
  const inputTgl=document.getElementById("input-tgl").value;
  const now=inputTgl?new Date(inputTgl):new Date();
  const tgl=now.toLocaleDateString("id-ID",{day:"2-digit",month:"2-digit",year:"numeric"});
  const jam=now.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  const kmb=bayar>0?bayar-tot:0;
  const lebar=32;
  const line="─".repeat(lebar);
  const center=(t)=>{const s=lebar-t.length;const l=Math.floor(s/2);return" ".repeat(Math.max(0,l))+t};
  const row=(l,r)=>{const sp=lebar-l.length-r.length;return l+" ".repeat(Math.max(1,sp))+r};

  let nota="";
  nota+=center("FOTO COPY PUTRA JAYA")+"\n";
  nota+=center("Jl. KH Wahid Hasyim No.14")+"\n";
  nota+=center("Pati Kidul, Pati, Jawa Tengah")+"\n";
  nota+=center("Telp: 021-12345678")+"\n";
  nota+=line+"\n";
  nota+=`No  : ${noTransaksi}\n`;
  nota+=`Tgl : ${tgl}  ${jam}\n`;
  nota+=`Kasir: Admin\n`;
  nota+=line+"\n";
  cart.forEach(item=>{
    nota+=item.nama+"\n";
    nota+=" "+item.qty+" x "+fmt(item.harga).padStart(12)+" = "+fmt(item.harga*item.qty)+"\n";
  });
  nota+=line+"\n";
  nota+=row("TOTAL",fmt(tot))+"\n";
  if(bayar>0){
    nota+=row("BAYAR",fmt(bayar))+"\n";
    nota+=row("KEMBALI",fmt(kmb))+"\n";
  }
  nota+=line+"\n";
  nota+=center("Terima kasih!")+"\n";
  nota+=center("Selamat berbelanja kembali")+"\n";

  document.getElementById("nota-content").textContent=nota;
  noTransaksi++;
}

function cetakNota(){
  const ukuran=document.getElementById("ukuran-kertas").value;
  const lebarMm=parseInt(ukuran);
  const isi=document.getElementById("nota-content").textContent;

  // -- jsPDF --
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:"mm",format:[lebarMm,297],orientation:"portrait"});
    const fontSize=lebarMm===58?7:9;
    doc.setFont("Courier","normal");
    doc.setFontSize(fontSize);
    const marginX=3;
    const lineH=fontSize*0.45;
    let y=5;
    isi.split("\n").forEach(line=>{
      doc.text(line,marginX,y);
      y+=lineH;
    });
    // potong tinggi sesuai konten
    const totalH=y+4;
    const doc2=new jsPDF({unit:"mm",format:[lebarMm,totalH],orientation:"portrait"});
    doc2.setFont("Courier","normal");
    doc2.setFontSize(fontSize);
    let y2=5;
    isi.split("\n").forEach(line=>{
      doc2.text(line,marginX,y2);
      y2+=lineH;
    });
    doc2.autoPrint();
    const blob=doc2.output("bloburl");
    const frame=document.createElement("iframe");
    frame.style.cssText="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;border:none";
    frame.src=blob;
    document.body.appendChild(frame);
    frame.onload=()=>{ setTimeout(()=>{ frame.contentWindow.print(); setTimeout(()=>document.body.removeChild(frame),2000); },300); };
    showNotif("Membuka dialog cetak...");
  } catch(e){
    // fallback window.print
    windowPrintFallback(lebarMm,isi);
  }
}

function exportPDF(){
  const ukuran=parseInt(document.getElementById("ukuran-kertas").value);
  const isi=document.getElementById("nota-content").textContent;
  try{
    const {jsPDF}=window.jspdf;
    const fontSize=ukuran===58?7:9;
    const lineH=fontSize*0.45;
    const lines=isi.split("\n");
    const totalH=lines.length*lineH+12;
    const doc=new jsPDF({unit:"mm",format:[ukuran,totalH],orientation:"portrait"});
    doc.setFont("Courier","normal");
    doc.setFontSize(fontSize);
    let y=5;
    lines.forEach(line=>{doc.text(line,3,y);y+=lineH;});
    const tgl=document.getElementById("input-tgl").value||new Date().toISOString();
    const namaFile=`nota_${noTransaksi-1}_${tgl.slice(0,10)}.pdf`;
    doc.save(namaFile);
    showNotif("PDF berhasil disimpan!");
  }catch(e){
    showNotif("Gagal export PDF: "+e.message);
  }
}

function windowPrintFallback(lebarMm,isi){
  const lebar=lebarMm+"mm";
  const fontSize=lebarMm===58?"8pt":"10pt";
  const pw=window.open("","_blank","width=420,height=600");
  pw.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>
    @page{size:${lebar} auto;margin:3mm}
    body{font-family:'Courier New',monospace;font-size:${fontSize};line-height:1.5;white-space:pre;width:${lebar};margin:0;padding:0}
  </style></head><body>${isi}</body></html>`);
  pw.document.close();
  pw.focus();
  setTimeout(()=>{pw.print();pw.close();},400);
  showNotif("Membuka dialog cetak (fallback)...");
}

function tutupNota(){
  document.getElementById("nota-overlay").classList.remove("show");
  clearCart();
  document.getElementById("input-bayar").value="";
  setDefaultTgl();
}

function showNotif(msg){
  const el=document.getElementById("notif");
  el.textContent=msg;el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),1800);
}

// Set default datetime ke sekarang
function setDefaultTgl(){
  const now=new Date();
  const pad=n=>String(n).padStart(2,"0");
  const val=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById("input-tgl").value=val;
}
buildKategori();renderProduk();updateTotal();setDefaultTgl();
</script>
</body>
</html>
